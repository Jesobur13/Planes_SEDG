<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subida de Archivos - SEDG</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    h2 {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: #1a1a1a;
    }

    /* Steps */
    .steps { display: flex; margin-bottom: 2rem; gap: 0; }
    .step {
      flex: 1;
      text-align: center;
      font-size: 12px;
      padding-bottom: 8px;
      color: #aaa;
      border-bottom: 2px solid #eee;
      transition: all 0.2s;
    }
    .step.active { color: #185FA5; border-bottom-color: #185FA5; font-weight: 600; }
    .step.done   { color: #1D9E75; border-bottom-color: #1D9E75; }

    /* Form elements */
    label {
      font-size: 13px;
      color: #555;
      display: block;
      margin-bottom: 6px;
      margin-top: 1rem;
    }
    label:first-child { margin-top: 0; }

    select, input[type="text"] {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border 0.15s;
    }
    select:focus, input:focus { border-color: #185FA5; }

    /* Drop zone */
    .drop {
      border: 1.5px dashed #ccc;
      border-radius: 12px;
      padding: 2rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 0.5rem;
    }
    .drop:hover, .drop.over { background: #f0f5ff; border-color: #185FA5; }
    .drop.has-file { background: #f0faf5; border-color: #1D9E75; border-style: solid; }
    .drop p { font-size: 14px; color: #777; }
    .drop .fname { font-size: 13px; color: #1D9E75; font-weight: 500; margin-top: 4px; }

    /* Buttons */
    .btn-row { display: flex; gap: 8px; margin-top: 1.5rem; }
    .btn-p {
      flex: 1;
      background: #185FA5;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
    }
    .btn-p:hover { background: #0C447C; }
    .btn-b {
      background: none;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 11px 16px;
      font-size: 14px;
      cursor: pointer;
      color: #666;
    }
    .btn-b:hover { background: #f5f5f5; }

    /* Error */
    .err {
      display: none;
      margin-top: 0.6rem;
      padding: 0.5rem 0.75rem;
      background: #fff0f0;
      border-radius: 6px;
      font-size: 13px;
      color: #c00;
    }

    /* Spinner */
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #eee;
      border-top-color: #185FA5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-box { text-align: center; padding: 2rem 0; }
    .loading-box p { margin-top: 1rem; font-size: 14px; color: #777; }

    /* Success */
    .ok-box { text-align: center; }
    .ok-icon { font-size: 40px; margin-bottom: 0.75rem; }
    .ok-box h3 { font-size: 16px; margin-bottom: 0.25rem; }
    .ok-box .ruta { font-size: 13px; color: #888; margin-bottom: 1rem; }
    .link-box {
      background: #f0f5ff;
      border-radius: 8px;
      padding: 0.9rem 1rem;
      word-break: break-all;
      font-family: monospace;
      font-size: 12px;
      color: #185FA5;
      text-align: left;
    }
    .copy-ok { font-size: 12px; color: #1D9E75; margin-top: 0.5rem; display: none; }
  </style>
</head>
<body>
<div class="card">
  <h2>Subida de Archivos &middot; SEDG</h2>

  <div class="steps">
    <div class="step active" id="s1">1 &middot; Distrito</div>
    <div class="step"        id="s2">2 &middot; Institución</div>
    <div class="step"        id="s3">3 &middot; Estudiante</div>
  </div>

  <!-- Paso 1 -->
  <div id="p1">
    <label>Selecciona el distrito</label>
    <select id="distrito">
      <option value="">— Seleccionar —</option>
      <option>09D01 - Ximena</option>
      <option>09D02 - Ximena</option>
      <option>09D03 - Centro</option>
      <option>09D04 - Portete</option>
      <option>09D05 - Tarqui</option>
      <option>09D06 - Mapasingue</option>
      <option>09D07 - Pascuales</option>
      <option>09D08 - Monte Sinaí</option>
      <option>09D09 - Chong</option>
      <option>09D10 - Progreso</option>
      <option>09D23 - Samborondón</option>
      <option>09D24 - Durán</option>
    </select>
    <div class="err" id="e1"></div>
    <div class="btn-row">
      <button class="btn-p" onclick="next2()">Siguiente</button>
    </div>
  </div>

  <!-- Paso 2 -->
  <div id="p2" style="display:none">
    <label>Nombre de la institución educativa</label>
    <input type="text" id="institucion" placeholder="Ej: Unidad Educativa San José">
    <div class="err" id="e2"></div>
    <div class="btn-row">
      <button class="btn-b" onclick="next1()">← Atrás</button>
      <button class="btn-p" onclick="next3()">Siguiente</button>
    </div>
  </div>

  <!-- Paso 3 -->
  <div id="p3" style="display:none">
    <label>Nombre del estudiante</label>
    <input type="text" id="estudiante" placeholder="Nombre completo">
    <label>Archivo</label>
    <!-- FIX: se añadió accept para guiar tipos de archivo permitidos -->
    <div class="drop" id="drop" onclick="document.getElementById('fi').click()">
      <input type="file" id="fi" style="display:none" accept=".pdf,.doc,.docx,.xls,.xlsx,.jpg,.jpeg,.png">
      <p>↑ Clic o arrastra el archivo aquí</p>
      <p class="fname" id="fname"></p>
    </div>
    <div class="err" id="e3"></div>
    <div class="btn-row">
      <!-- FIX: botón Atrás ahora llama a goBackToStep2() para limpiar errores del paso 3 -->
      <button class="btn-b" onclick="goBackToStep2()">← Atrás</button>
      <button class="btn-p" onclick="submit()">Subir a Drive</button>
    </div>
  </div>

  <!-- Cargando -->
  <div id="loading" class="loading-box" style="display:none">
    <div class="spinner"></div>
    <p>Subiendo archivo a Drive...</p>
  </div>

  <!-- Éxito -->
  <div id="ok" class="ok-box" style="display:none">
    <div class="ok-icon">✅</div>
    <h3>Archivo subido correctamente</h3>
    <p class="ruta" id="ruta"></p>
    <div class="link-box" id="result-link"></div>
    <div class="btn-row" style="margin-top:1rem">
      <button class="btn-b" onclick="copiar()">Copiar enlace</button>
      <button class="btn-p" onclick="reset()">Subir otro</button>
    </div>
    <p class="copy-ok" id="copy-ok">¡Enlace copiado al portapapeles!</p>
  </div>

  <!-- Error -->
  <div id="fail" style="display:none">
    <p style="font-weight:600;color:#c00;margin-bottom:0.5rem">No se pudo subir el archivo</p>
    <p id="fail-msg" style="font-size:13px;color:#666;margin-bottom:1rem"></p>
    <div class="btn-row">
      <button class="btn-p" onclick="show('p3');setSteps(3)">Intentar de nuevo</button>
    </div>
  </div>

</div>

<script>
  // ============================================================
  //  CONFIGURACIÓN — reemplaza con la URL completa de tu Apps Script
  // ============================================================
  // FIX: URL corregida — verifica que termine exactamente en /exec
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyCZLt5uF5gJ6m4H0U93X3jpsxWKUZmJlw8eOwdj2_htnZi_TloVIhkYukBF6mdk392/exec';

  // Límite de tamaño de archivo: 10 MB (Google Apps Script acepta hasta ~50 MB en base64,
  // pero archivos grandes pueden agotar el timeout de 30 s del script)
  const MAX_SIZE_MB = 10;

  // ============================================================
  //  ESTADO
  // ============================================================
  let file = null;
  let resultUrl = '';

  // ============================================================
  //  DRAG & DROP / SELECCIÓN DE ARCHIVO
  // ============================================================
  const fi   = document.getElementById('fi');
  const drop = document.getElementById('drop');

  fi.addEventListener('change', () => setFile(fi.files[0]));
  drop.addEventListener('dragover',  e => { e.preventDefault(); drop.classList.add('over'); });
  drop.addEventListener('dragleave', ()  => drop.classList.remove('over'));
  drop.addEventListener('drop', e => {
    e.preventDefault();
    drop.classList.remove('over');
    setFile(e.dataTransfer.files[0]);
  });

  function setFile(f) {
    if (!f) return;
    // FIX: validación de tamaño máximo antes de aceptar el archivo
    if (f.size > MAX_SIZE_MB * 1024 * 1024) {
      err('e3', 'El archivo supera el límite de ' + MAX_SIZE_MB + ' MB. Selecciona un archivo más pequeño.');
      drop.classList.remove('has-file');
      fi.value = '';
      file = null;
      document.getElementById('fname').textContent = '';
      return;
    }
    file = f;
    document.getElementById('fname').textContent = f.name + ' — ' + (f.size / 1024).toFixed(0) + ' KB';
    drop.classList.add('has-file');
    err('e3', ''); // limpiar error previo al seleccionar archivo válido
  }

  // ============================================================
  //  NAVEGACIÓN ENTRE PASOS
  // ============================================================
  function show(id) {
    ['p1','p2','p3','loading','ok','fail'].forEach(x =>
      document.getElementById(x).style.display = (x === id ? 'block' : 'none')
    );
  }

  function setSteps(n) {
    [1,2,3].forEach(i =>
      document.getElementById('s' + i).className = 'step' + (i < n ? ' done' : i === n ? ' active' : '')
    );
  }

  function err(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = msg ? 'block' : 'none';
  }

  function next1() { err('e1',''); err('e2',''); setSteps(1); show('p1'); }

  function next2() {
    if (!document.getElementById('distrito').value) { err('e1','Selecciona un distrito'); return; }
    err('e1',''); err('e2',''); setSteps(2); show('p2');
  }

  // FIX: función separada para retroceder desde paso 3 → limpia el error e3
  function goBackToStep2() {
    err('e3','');
    err('e2','');
    setSteps(2);
    show('p2');
  }

  function next3() {
    if (!document.getElementById('institucion').value.trim()) { err('e2','Escribe el nombre de la institución'); return; }
    err('e2',''); err('e3',''); setSteps(3); show('p3');
  }

  // ============================================================
  //  SUBIDA — fetch SIN Content-Type para evitar preflight CORS
  // ============================================================
  async function submit() {
    const est  = document.getElementById('estudiante').value.trim();
    const inst = document.getElementById('institucion').value.trim();
    const dist = document.getElementById('distrito').value;

    if (!est)  { err('e3','Escribe el nombre del estudiante'); return; }
    if (!file) { err('e3','Selecciona un archivo'); return; }
    err('e3','');

    show('loading');

    try {
      const b64 = await toB64(file);

      // Sin Content-Type → el navegador NO lanza preflight OPTIONS
      // Google Apps Script puede responder directamente al POST
      const res = await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({
          distrito:    dist,
          institucion: inst,
          estudiante:  est,
          fileName:    file.name,
          fileBase64:  b64,
          mimeType:    file.type || 'application/octet-stream'
        })
      });

      const json = await res.json();

      if (json.success && json.link) {
        resultUrl = json.link;
        document.getElementById('result-link').textContent = json.link;
        document.getElementById('ruta').textContent = dist + ' › ' + inst;
        show('ok');
      } else {
        throw new Error(json.error || 'Respuesta inesperada del servidor');
      }

    } catch (e) {
      document.getElementById('fail-msg').textContent = e.message;
      show('fail');
    }
  }

  // ============================================================
  //  UTILIDADES
  // ============================================================
  function toB64(f) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload  = () => res(r.result.split(',')[1]);
      r.onerror = rej;
      r.readAsDataURL(f);
    });
  }

  // FIX: se añadió .catch() para manejar cuando el usuario niega el permiso
  // o la página está en HTTP (clipboard solo funciona en HTTPS)
  function copiar() {
    if (!navigator.clipboard) {
      // Fallback para HTTP o navegadores sin soporte
      const el = document.getElementById('copy-ok');
      el.textContent = 'Copia el enlace manualmente desde arriba';
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 3000);
      return;
    }
    navigator.clipboard.writeText(resultUrl)
      .then(() => {
        const m = document.getElementById('copy-ok');
        m.textContent = '¡Enlace copiado al portapapeles!';
        m.style.display = 'block';
        setTimeout(() => m.style.display = 'none', 2500);
      })
      .catch(() => {
        const m = document.getElementById('copy-ok');
        m.textContent = 'No se pudo copiar. Cópialo manualmente.';
        m.style.color = '#c00';
        m.style.display = 'block';
        setTimeout(() => { m.style.display = 'none'; m.style.color = '#1D9E75'; }, 3000);
      });
  }

  function reset() {
    file = null;
    resultUrl = '';
    ['distrito','institucion','estudiante'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('fname').textContent = '';
    drop.classList.remove('has-file');
    fi.value = '';
    // FIX: limpiar todos los mensajes de error al reiniciar
    ['e1','e2','e3'].forEach(id => err(id, ''));
    setSteps(1);
    show('p1');
  }
</script>
</body>
</html>
